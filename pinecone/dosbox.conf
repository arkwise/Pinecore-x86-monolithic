# Pinecone Desktop - DOSBox launch config
#
# Usage:
#   cd pinecone
#   dosbox -conf dosbox.conf
#
# Mounts the current pinecone/ directory as C: and auto-launches DESKTOP.EXE.
# Run "make run-dosbox" for a one-shot launcher.

[sdl]
fullscreen=false
windowresolution=1280x960
output=opengl
autolock=true

[render]
aspect=true
scaler=normal2x

[cpu]
core=auto
cputype=pentium_slow
cycles=auto

[mixer]
nosound=false
rate=44100

[dos]
xms=true
ems=true
umb=true

[autoexec]
@echo off
rem Mount the pinecone project directory as C:
mount c .
c:
cls
echo Pinecone Desktop Environment - DOSBox launcher
echo -----------------------------------------------
echo Launching DESKTOP.EXE...
echo (press ESC inside the desktop to exit)
echo.
DESKTOP.EXE
echo.
echo DESKTOP.EXE exited. Type EXIT to leave DOSBox.
